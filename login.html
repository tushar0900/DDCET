<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDCET Hub — Access Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --error: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; color: var(--primary); }
        .header p { font-size: 14px; color: var(--text-muted); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .toggle-text span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }
        .toggle-text span:hover { text-decoration: underline; }

        .message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .message.error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); display: block; }
        .message.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); display: block; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="header">
            <h1>DDCET Study Hub</h1>
            <p id="form-desc">Login to access your notes</p>
        </div>

        <form id="auth-form">
            <div class="form-group">
                <label for="email">Institutional Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn" class="btn">Sign In</button>
        </form>

        <div id="msg" class="message"></div>

        <div class="toggle-text">
            <span id="toggle-form">Don't have an account? Sign Up</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-form');
        const formDesc = document.getElementById('form-desc');
        const msg = document.getElementById('msg');

        let isLogin = true;
        const API_URL = 'http://localhost:5001/api';

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            submitBtn.innerText = isLogin ? 'Sign In' : 'Create Account';
            toggleBtn.innerText = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Sign In";
            formDesc.innerText = isLogin ? "Login to access your notes" : "Register to start studying";
            msg.className = 'message';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            const endpoint = isLogin ? '/login' : '/signup';

            try {
                const response = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        localStorage.setItem('ddcet_token', data.token);
                        msg.innerText = 'Login successful! Redirecting...';
                        msg.className = 'message success';
                        setTimeout(() => {
                            window.location.href = 'ddcet_notes_v4.html';
                        }, 1000);
                    } else {
                        msg.innerText = 'Registration successful! You can now login.';
                        msg.className = 'message success';
                        isLogin = true;
                        submitBtn.innerText = 'Sign In';
                        toggleBtn.innerText = "Don't have an account? Sign Up";
                        formDesc.innerText = "Login to access your notes";
                    }
                } else {
                    msg.innerText = data.message || 'Something went wrong';
                    msg.className = 'message error';
                }
            } catch (err) {
                msg.innerText = 'Cannot connect to server. Make sure the backend is running.';
                msg.className = 'message error';
            }
        });
    </script>
</body>
</html>
