<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - DDCET Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --bg-accent: rgba(79, 70, 229, 0.22);
            --card-bg: rgba(15, 23, 42, 0.88);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --error: #ef4444;
            --success: #10b981;
            --surface: rgba(15, 23, 42, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top, var(--bg-accent), transparent 34%),
                linear-gradient(160deg, #020617, #0f172a 48%, #111827);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .reset-container {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 25px 60px -20px rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(14px);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(79, 70, 229, 0.12);
            color: #c7d2fe;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .input-shell {
            position: relative;
        }

        .input-shell input {
            padding-right: 50px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .password-toggle:hover {
            background: rgba(148, 163, 184, 0.12);
            color: var(--text);
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 4px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            cursor: wait;
            opacity: 0.75;
            transform: none;
        }

        .message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            padding: 11px 12px;
            border-radius: 10px;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.24);
            display: block;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.12);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.24);
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .back-link a {
            color: #c7d2fe;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #e0e7ff;
            text-decoration: underline;
        }

        .expired-message {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.24);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 24px;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                min-height: 100dvh;
            }

            .reset-container {
                padding: 20px 16px;
                border-radius: 12px;
            }

            .header h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            .header p {
                font-size: 12px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 16px;
            }

            .btn {
                padding: 12px 16px;
                min-height: 44px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="header">
            <span class="eyebrow">DDCET Student Portal</span>
            <h1>Reset Your Password</h1>
            <p>Create a new password for your account.</p>
        </div>

        <div id="expired-message" class="expired-message" style="display: none;">
            <strong>Reset link has expired</strong><br>
            <a href="login.html" style="color: inherit; text-decoration: underline;">Request a new one</a>
        </div>

        <form id="reset-form" novalidate>
            <div class="form-group">
                <label for="new-password">New Password</label>
                <div class="input-shell">
                    <input type="password" id="new-password" placeholder="Enter new password" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" data-target="new-password" aria-label="Show password" title="Show password"></button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-shell">
                    <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Show password" title="Show password"></button>
                </div>
            </div>

            <button type="submit" id="reset-btn" class="btn">Reset Password</button>
        </form>

        <div id="msg" class="message"></div>

        <div class="back-link">
            <a href="login.html">Back to Sign In</a>
        </div>
    </div>

    <script>
        const isLocal =
            window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1' ||
            window.location.hostname === '::1' ||
            window.location.protocol === 'file:';
        const API_URL = isLocal ? 'http://localhost:5001/api' : '/api';
        const serverErrorMessage = isLocal
            ? 'Cannot connect to server. Make sure the backend is running.'
            : 'Cannot connect to server right now. Please try again.';
        const resetForm = document.getElementById('reset-form');
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const resetBtn = document.getElementById('reset-btn');
        const msg = document.getElementById('msg');
        const expiredMessage = document.getElementById('expired-message');
        const passwordToggles = document.querySelectorAll('.password-toggle');
        const eyeIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1.5 12s4.1-7 10.5-7 10.5 7 10.5 7-4.1 7-10.5 7S1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.25"></circle></svg>';
        const eyeOffIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.58 10.58A2 2 0 0 0 12 16a2 2 0 0 0 1.42-.58"></path><path d="M9.88 5.09A11 11 0 0 1 12 5c6.4 0 10.5 7 10.5 7a19.2 19.2 0 0 1-4.04 4.64"></path><path d="M6.61 6.61A19.05 19.05 0 0 0 1.5 12s4.1 7 10.5 7a10.8 10.8 0 0 0 5.02-1.2"></path></svg>';

        let resetToken = null;
        let resetEmail = null;

        function showMessage(text, type) {
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        function hideMessage() {
            msg.textContent = '';
            msg.className = 'message';
        }

        function updatePasswordToggle(button, input) {
            const isVisible = input.type === 'text';
            button.innerHTML = isVisible ? eyeOffIcon : eyeIcon;
            button.setAttribute('aria-label', isVisible ? 'Hide password' : 'Show password');
            button.title = isVisible ? 'Hide password' : 'Show password';
        }

        // Extract token and email from URL parameters
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            resetToken = params.get('token');
            resetEmail = params.get('email');

            if (!resetToken || !resetEmail) {
                expiredMessage.style.display = 'block';
                resetForm.style.display = 'none';
                return false;
            }

            return true;
        }

        // Setup password toggles
        passwordToggles.forEach((button) => {
            const input = document.getElementById(button.dataset.target);
            updatePasswordToggle(button, input);

            button.addEventListener('click', () => {
                input.type = input.type === 'password' ? 'text' : 'password';
                updatePasswordToggle(button, input);
                input.focus({ preventScroll: true });
                const cursorPosition = input.value.length;
                input.setSelectionRange(cursorPosition, cursorPosition);
            });
        });

        // Handle form submission
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!newPassword || !confirmPassword) {
                showMessage('Both password fields are required.', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Password should be at least 6 characters long.', 'error');
                newPasswordInput.focus();
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                confirmPasswordInput.focus();
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';

            try {
                const response = await fetch(API_URL + '/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: resetToken,
                        email: resetEmail,
                        password: newPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.message || 'Failed to reset password.', 'error');
                    if (response.status === 401) {
                        expiredMessage.style.display = 'block';
                        resetForm.style.display = 'none';
                    }
                    return;
                }

                showMessage('Password reset successfully! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                showMessage(serverErrorMessage, 'error');
                console.error('Reset password error:', error);
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });

        // Check if token and email are valid on page load
        if (!getQueryParams()) {
            resetBtn.disabled = true;
        }
    </script>
</body>
</html>
