services:
  - type: web
    name: ddcet-hub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    environmentSlug: node
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://Tushar:Tushar123%23@cluster0.xxdrret.mongodb.net/ddcet_hub
      - key: SECRET_KEY
        value: your-production-secret-key-change-this-12345
      - key: NODE_ENV
        value: production
      # Note: Do not hardcode PORT here; Render provides the runtime PORT variable.

  - type: static_site
    name: ddcet-hub-frontend
    rootDir: .
    buildCommand: echo "Frontend is static HTML"
    publicPath: ./
    routes:
      - path: /api/*
        destination: http://localhost:5001
